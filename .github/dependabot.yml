# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/about-dependabot-version-updates
version: 2
updates:
  - package-ecosystem: 'bundler'
    directory: '/'
    schedule:
      interval: 'daily'
    groups:
      github-dependencies:
        patterns:
          - '*'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
    groups:
      github-dependencies:
        patterns:
          - '*'
  - package-ecosystem: 'pre-commit'
    directory: '/'
    schedule:
      interval: 'daily'
    groups:
      github-dependencies:
        patterns:
          - '*'
